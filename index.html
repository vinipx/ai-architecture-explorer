<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Architecture Explorer</title>
    
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            console.error(error);
            document.write('<div style="color:red; padding:20px; font-family:monospace; background:white; z-index:9999; position:fixed; top:0; left:0; width:100%; height:100%;">');
            document.write('<h2>Application Error</h2>');
            document.write('<p>' + message + '</p>');
            document.write('<p>Line: ' + lineno + '</p>');
            document.write('</div>');
        };
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        [v-cloak] { display: none !important; }

        /* CSS Variables - Light Theme (Default shadcn) */
        :root {
          --background: 0 0% 100%;
          --foreground: 222.2 84% 4.9%;
          --muted: 210 40% 96.1%;
          --muted-foreground: 215.4 16.3% 46.9%;
          --popover: 0 0% 100%;
          --popover-foreground: 222.2 84% 4.9%;
          --card: 0 0% 100%;
          --card-foreground: 222.2 84% 4.9%;
          --border: 214.3 31.8% 91.4%;
          --input: 214.3 31.8% 91.4%;
          --primary: 222.2 47.4% 11.2%;
          --primary-foreground: 210 40% 98%;
          --secondary: 210 40% 96.1%;
          --secondary-foreground: 222.2 47.4% 11.2%;
          --accent: 210 40% 96.1%;
          --accent-foreground: 222.2 47.4% 11.2%;
          --destructive: 0 84.2% 60.2%;
          --destructive-foreground: 210 40% 98%;
          --ring: 215 20.2% 65.1%;
          --radius: 0.5rem;
        }

        /* CSS Variables - Dark Theme (neutral grays) */
        .dark {
          --background: 0 0% 9%;
          --foreground: 0 0% 98%;
          --muted: 0 0% 15%;
          --muted-foreground: 0 0% 63%;
          --popover: 0 0% 9%;
          --popover-foreground: 0 0% 98%;
          --card: 0 0% 9%;
          --card-foreground: 0 0% 98%;
          --border: 0 0% 15%;
          --input: 0 0% 15%;
          --primary: 0 0% 98%;
          --primary-foreground: 0 0% 9%;
          --secondary: 0 0% 15%;
          --secondary-foreground: 0 0% 98%;
          --accent: 0 0% 15%;
          --accent-foreground: 0 0% 98%;
          --destructive: 0 62.8% 30.6%;
          --destructive-foreground: 0 0% 98%;
          --ring: 0 0% 83.9%;
        }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: hsl(var(--muted-foreground)); }

        .terminal-bg {
            background-color: #000000;
        }
        .dark .terminal-bg {
            background-color: #000000;
        }
    </style>
    <script>
        tailwind.config = {
          darkMode: 'class',
          theme: {
            extend: {
              colors: {
                border: "hsl(var(--border))",
                input: "hsl(var(--input))",
                ring: "hsl(var(--ring))",
                background: "hsl(var(--background))",
                foreground: "hsl(var(--foreground))",
                primary: { DEFAULT: "hsl(var(--primary))", foreground: "hsl(var(--primary-foreground))" },
                secondary: { DEFAULT: "hsl(var(--secondary))", foreground: "hsl(var(--secondary-foreground))" },
                destructive: { DEFAULT: "hsl(var(--destructive))", foreground: "hsl(var(--destructive-foreground))" },
                muted: { DEFAULT: "hsl(var(--muted))", foreground: "hsl(var(--muted-foreground))" },
                accent: { DEFAULT: "hsl(var(--accent))", foreground: "hsl(var(--accent-foreground))" },
                popover: { DEFAULT: "hsl(var(--popover))", foreground: "hsl(var(--popover-foreground))" },
                card: { DEFAULT: "hsl(var(--card))", foreground: "hsl(var(--card-foreground))" },
              }
            }
          }
        }
    </script>
</head>
<body class="bg-background text-foreground h-screen w-screen transition-colors duration-200">
    
    <div id="app" v-cloak class="h-full w-full flex flex-col bg-background overflow-hidden">
        
        <!-- Header -->
        <header class="h-14 border-b border-border flex items-center px-6 bg-card shrink-0 shadow-sm z-10 transition-colors duration-200">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-orange-500 fill-orange-500/20"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
                <h1 class="font-semibold text-lg tracking-tight">Claude Architecture Explorer</h1>
            </div>
            
            <div class="ml-auto flex items-center gap-4">
                <div class="text-sm text-muted-foreground hidden sm:block">
                    Interactive Reference Guide
                </div>
                
                <button 
                    @click="toggleTheme" 
                    class="p-2 rounded-md hover:bg-accent text-muted-foreground hover:text-accent-foreground transition-colors border border-transparent hover:border-border"
                    title="Toggle Theme"
                >
                    <svg v-if="isDark" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                    <svg v-else xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                </button>
            </div>
        </header>

        <!-- Main Workspace -->
        <div class="flex flex-1 overflow-hidden">
            
            <!-- Sidebar (File Tree) -->
            <aside class="w-80 border-r border-border bg-card/50 flex flex-col shrink-0 transition-colors duration-200">
                <div class="p-3 border-b border-border bg-muted/30 shrink-0">
                    <h2 class="text-xs font-bold uppercase tracking-wider text-muted-foreground">Repository Structure</h2>
                </div>
                <div class="flex-1 overflow-y-auto p-2">
                    <file-tree-node 
                        v-for="node in fileSystem" 
                        :key="node.id" 
                        :node="node" 
                        :level="0"
                        :selected-id="selectedNode ? selectedNode.id : null"
                        @select="selectedNode = $event"
                        @hover="hoveredNode = $event"
                    ></file-tree-node>
                </div>
            </aside>

            <!-- Content Area -->
            <main class="flex-1 flex flex-col min-w-0 bg-background overflow-hidden relative transition-colors duration-200">
                
                <template v-if="displayNode">
                    <!-- Info Header Area -->
                    <div class="shrink-0 p-6 pb-2">
                        <div class="mb-4">
                            <h2 class="text-2xl font-bold text-foreground flex items-center gap-2">
                                <svg v-if="displayNode.type === 'folder'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-orange-500 fill-orange-500/20"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
                                <svg v-else xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-slate-400"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                                
                                {{ displayNode.name }}
                                
                                <span v-if="displayNode.badge" :class="['text-xs font-bold uppercase tracking-wider px-2 py-1 rounded border align-middle ml-2', displayNode.badge === 'Real World' ? 'bg-indigo-500/10 text-indigo-500 border-indigo-500/20' : 'bg-secondary text-secondary-foreground border-border']">
                                    {{ displayNode.badge }}
                                </span>
                            </h2>
                            <p class="text-sm text-muted-foreground mt-1 flex items-center gap-1.5">
                                <span :class="['w-2 h-2 rounded-full', hoveredNode ? 'bg-amber-500 animate-pulse' : 'bg-green-500']"></span>
                                {{ hoveredNode ? 'Previewing hover details' : 'Selected' }}
                            </p>
                        </div>

                        <!-- Documentation Card -->
                        <div v-if="displayNode.info" class="bg-card border border-border rounded-xl shadow-sm overflow-hidden animate-in fade-in zoom-in-95 duration-200 transition-colors flex-shrink-0 mb-4">
                            <div class="bg-muted px-4 py-3 border-b border-border flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-foreground"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                                <h3 class="font-semibold text-sm text-foreground">Documentation Details</h3>
                            </div>
                            <div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <h4 class="text-xs font-bold uppercase tracking-wider text-muted-foreground mb-1">What is it?</h4>
                                    <p class="text-sm text-foreground leading-relaxed">{{ displayNode.info.what }}</p>
                                </div>
                                <div>
                                    <h4 class="text-xs font-bold uppercase tracking-wider text-muted-foreground mb-1">Why is it required?</h4>
                                    <p class="text-sm text-foreground leading-relaxed">{{ displayNode.info.why }}</p>
                                </div>
                                <div>
                                    <h4 class="text-xs font-bold uppercase tracking-wider text-muted-foreground mb-1">How to use it?</h4>
                                    <p class="text-sm text-foreground leading-relaxed">{{ displayNode.info.how }}</p>
                                </div>
                                <div>
                                    <h4 class="text-xs font-bold uppercase tracking-wider text-muted-foreground mb-1">When is it loaded?</h4>
                                    <p class="text-sm text-foreground leading-relaxed">{{ displayNode.info.when }}</p>
                                </div>
                            </div>
                            <div v-if="displayNode.info.priority" class="p-4 pt-0">
                                <div class="bg-indigo-500/10 border border-indigo-500/20 rounded-md p-3">
                                    <h4 class="text-xs font-bold uppercase tracking-wider text-indigo-500 mb-1 flex items-center gap-1.5">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                                        Priority Level
                                    </h4>
                                    <p class="text-sm text-foreground leading-relaxed">{{ displayNode.info.priority }}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- File Content Area -->
                    <div v-if="displayNode.type === 'file'" class="flex-1 p-6 pt-0 min-h-0 flex flex-col">
                        <div class="flex items-center justify-between mb-2 shrink-0">
                            <h3 class="text-sm font-semibold uppercase tracking-wider text-muted-foreground flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                                File Content
                            </h3>
                        </div>
                        <div class="flex-1 border border-border rounded-xl terminal-bg overflow-hidden shadow-inner flex transition-colors duration-200">
                            <pre class="flex-1 p-4 overflow-auto text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{{ displayNode.content || "// No content available for this file." }}</pre>
                        </div>
                    </div>
                    
                    <!-- Folder Empty State -->
                    <div v-else class="flex-1 p-6 pt-4 flex items-center justify-center">
                        <div class="text-center text-muted-foreground">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-16 h-16 mx-auto mb-4 opacity-20"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
                            <p class="text-lg font-medium text-foreground">Select a file to view its contents</p>
                            <p class="text-sm mt-1">Folders only contain structural metadata.</p>
                        </div>
                    </div>
                </template>
                
            </main>
        </div>
    </div>

    <script>
        const fileSystemData = [
          {
            id: "user",

                children: [

                      when: "When working in this specific project."

                    children: [
                      {
                        id: "user-projects-memory-core",

              {

                    children: [
                      {

                        type: "file",

                    children: [
                      {
                        id: "proj-skills-db",
                        name: "db-migration",
                        type: "folder",
                        info: { what: "A real-world skill for database migrations.", why: "Allows Claude to run prisma migrations autonomously.", how: "Follows the SKILL.md specification.", when: "On demand." },
                        children: [
                          {
                            id: "proj-skills-db-skill",
                            name: "SKILL.md",
                            badge: "Tool",
                            type: "file",
                            content: `---
name: db-migration
description: Safely generates and applies Prisma database migrations. Use this when the user asks to update the database schema.
---

# Trigger
When the user says "migrate the database" or modifies a \`schema.prisma\` file.

# Execution Steps

        const app = Vue.createApp({
            data() {
                return {
                    fileSystem: fileSystemData,
                    selectedNode: null,
                    hoveredNode: null,
                    isDark: true
                }
            },
            computed: {
                displayNode() {
                    return this.hoveredNode || this.selectedNode || this.fileSystem[0];
                }
            },
            methods: {
                toggleTheme() {
                    this.isDark = !this.isDark;
                    if (this.isDark) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                }
            },
            mounted() {
                if (this.fileSystem[0] && this.fileSystem[0].children) {
                    const firstFile = this.fileSystem[0].children.find(c => c.type === 'file');
                    this.selectedNode = firstFile || this.fileSystem[0];
                }
                
                if (this.isDark) {
                    document.documentElement.classList.add('dark');
                }
            }
        });

        app.component('file-tree-node', {
            name: 'FileTreeNode',
            props: ['node', 'level', 'selectedId'],
            emits: ['select', 'hover'],
            data() {
                return {
                    isOpen: this.level < 2
                }
            },
            template: `
                <div class="select-none">
                    <div 
                        :class="['flex items-center py-1.5 px-2 rounded-md cursor-pointer text-sm transition-colors', selectedId === node.id ? 'bg-accent text-accent-foreground font-medium' : 'hover:bg-muted text-muted-foreground']"
                        :style="{ paddingLeft: (level * 1.5 + 0.5) + 'rem' }"
                        @click.stop="handleClick"
                        @mouseenter="$emit('hover', node)"
                        @mouseleave="$emit('hover', null)"
                    >
                        <div class="w-4 h-4 mr-1.5 flex items-center justify-center">
                            <template v-if="node.type === 'folder'">
                                <svg v-if="isOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3 opacity-70"><polyline points="6 9 12 15 18 9"/></svg>

                        </div>

                            <template v-if="node.type === 'folder'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-orange-500 fill-orange-500/20"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
                            </template>
                            <template v-else>
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" :class="['w-4 h-4', selectedId === node.id ? 'text-accent-foreground' : 'text-slate-400']"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                            </template>
                        </div>
                        
                        <span class="truncate flex-1">{{ node.name }}</span>
                        
                        <span v-if="node.badge" :title="getBadgeTooltip(node.badge)" :class="['ml-2 text-[10px] uppercase font-bold tracking-wider px-1.5 py-0.5 rounded border opacity-80 whitespace-nowrap', node.badge.includes('Level') ? 'bg-indigo-500/10 text-indigo-500 border-indigo-500/20 cursor-help' : 'bg-secondary text-secondary-foreground border-border']">

                    </div>

                    <div v-if="node.type === 'folder' && isOpen && node.children">
                        <file-tree-node 
                            v-for="child in node.children" 
                            :key="child.id" 
                            :node="child" 
                            :level="level + 1" 
                            :selected-id="selectedId"
                            @select="$emit('select', $event)"
                            @hover="$emit('hover', $event)"
                        />
                    </div>
                </div>
            `,
            methods: {
                handleClick() {
                    if (this.node.type === 'folder') {
                        this.isOpen = !this.isOpen;
                    }
                    this.$emit('select', this.node);
                },
                getBadgeTooltip(badge) {
                    if (!badge) return '';
                    if (badge.includes('Level 1')) return 'Level 1: Global scope. Lowest priority. Applies to all projects.';
                    if (badge.includes('Level 2')) return 'Level 2: Auto-memory. Written by Claude. Overrides Level 1.';
                    if (badge.includes('Level 3:')) return 'Level 3: Project scope. Shared via Git. Overrides Levels 1 & 2.';
                    if (badge.includes('Level 3b')) return 'Level 3b: Personal project overrides. Gitignored. Overrides Level 3.';
                    if (badge.includes('Level 4')) return 'Level 4: Modular rules. Highest priority. Overrides all broader levels.';
                    return '';
                }
            }
        });

        app.mount('#app');
